inventory:
  ore: Ore is a raw material that can be mined from the world. It is typically found in veins. The rarest ores are gold, silver, mythril, and prisma.
  ingot: Ingots are refined materials that are created by smelting ores. They are used in crafting recipes.
  gem: Gems are extremely rare stones that can be found in the world. They are extremely valuable.